AWSTemplateFormatVersion: '2010-09-09'
Description: 'Chatbot IA Maison - Bedrock Knowledge Base + Lambda + API Gateway - eu-west-3'

Parameters:
  ProjectName:
    Type: String
    Default: 'maison-chatbot'
    Description: 'Nom du projet'

Resources:

  # ============================================================
  # S3 — Stockage des documents maison
  # ============================================================
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ============================================================
  # IAM — Role pour Bedrock Knowledge Base
  # ============================================================
  BedrockKnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-bedrock-kb-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockKnowledgeBasePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentsBucket.Arn
                  - !Sub '${DocumentsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: '*'

  # ============================================================
  # IAM — Role pour Lambda
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:RetrieveAndGenerate
                  - bedrock:Retrieve
                  - bedrock:InvokeModel
                Resource: '*'

  # ============================================================
  # Lambda — Fonction chatbot
  # ============================================================
  ChatbotFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-chatbot'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          KNOWLEDGE_BASE_ID: 'PLACEHOLDER'
          MODEL_ID: 'eu.anthropic.claude-haiku-4-5-20251001-v1:0'
      Code:
        ZipFile: |
          import boto3
          import json
          import os

          bedrock = boto3.client('bedrock-agent-runtime', region_name='eu-west-3')

          def handler(event, context):
              body = json.loads(event.get('body', '{}'))
              question = body.get('question', '')

              if not question:
                  return {
                      'statusCode': 400,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'error': 'Question manquante'})
                  }

              response = bedrock.retrieve_and_generate(
                  input={'text': question},
                  retrieveAndGenerateConfiguration={
                      'type': 'KNOWLEDGE_BASE',
                      'knowledgeBaseConfiguration': {
                          'knowledgeBaseId': os.environ['KNOWLEDGE_BASE_ID'],
                          'modelArn': os.environ['MODEL_ID'],
                          'generationConfiguration': {
                              'promptTemplate': {
                                  'textPromptTemplate': """Tu es l'assistant personnel de la maison.
                                  Réponds en français, de façon concise et utile.
                                  Utilise uniquement les informations du contexte fourni.
                                  Si tu ne sais pas, dis-le clairement.

                                  Contexte: $search_results$

                                  Question: $query$"""
                              }
                          }
                      }
                  }
              )

              answer = response['output']['text']

              return {
                  'statusCode': 200,
                  'headers': {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*'
                  },
                  'body': json.dumps({'answer': answer})
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ============================================================
  # API Gateway — Exposition HTTP
  # ============================================================
  ChatbotApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-api'
      Description: 'API chatbot maison'
      EndpointConfiguration:
        Types:
          - REGIONAL

  ChatbotResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ChatbotApi
      ParentId: !GetAtt ChatbotApi.RootResourceId
      PathPart: 'chat'

  ChatbotMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ChatbotApi
      ResourceId: !Ref ChatbotResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:eu-west-3:lambda:path/2015-03-31/functions/${ChatbotFunction.Arn}/invocations'

  ChatbotDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ChatbotMethod
    Properties:
      RestApiId: !Ref ChatbotApi
      StageName: prod

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatbotFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:eu-west-3:${AWS::AccountId}:${ChatbotApi}/*'

  # ============================================================
  # CloudWatch — Logs Lambda
  # ============================================================
  ChatbotLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-chatbot'
      RetentionInDays: 30

# ============================================================
# Outputs
# ============================================================
Outputs:

  DocumentsBucketName:
    Description: 'Bucket S3 — déposer tes documents maison ici'
    Value: !Ref DocumentsBucket

  ApiEndpoint:
    Description: 'URL de ton chatbot'
    Value: !Sub 'https://${ChatbotApi}.execute-api.eu-west-3.amazonaws.com/prod/chat'

  LambdaFunctionName:
    Description: 'Nom de la fonction Lambda'
    Value: !Ref ChatbotFunction

  BedrockRoleArn:
    Description: 'ARN du role Bedrock Knowledge Base'
    Value: !GetAtt BedrockKnowledgeBaseRole.Arn

